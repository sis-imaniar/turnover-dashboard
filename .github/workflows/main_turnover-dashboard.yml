# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - turnover-dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: npm

      - name: npm install and build
        run: |
          npm install
          npm run build

      - name: Prepare standalone deployment package
        shell: pwsh
        run: |
          if (-not (Test-Path .next/standalone)) {
            throw "Missing .next/standalone. Ensure next.config has output: 'standalone'."
          }

          New-Item -ItemType Directory -Force -Path deploy_package | Out-Null
          Copy-Item -Path .next/standalone/* -Destination deploy_package -Recurse -Force

          New-Item -ItemType Directory -Force -Path deploy_package/.next | Out-Null
          Copy-Item -Path .next/static -Destination deploy_package/.next/static -Recurse -Force

          if (Test-Path public) {
            Copy-Item -Path public -Destination deploy_package/public -Recurse -Force
          }

          # Replace Next standalone server (parseInt PORT) with Azure/iisnode-compatible server
          Copy-Item -Path server.js -Destination deploy_package/server.js -Force
          Copy-Item -Path web.config -Destination deploy_package/web.config -Force

          # Stop Kudu from running npm install again (fills App Service disk → ENOSPC)
          @"
          [config]
          SCM_DO_BUILD_DURING_DEPLOYMENT=false
          "@ | Set-Content -Path deploy_package/.deployment -Encoding utf8

          # Keep dependencies from standalone package.json; only ensure start script
          $pkgPath = "deploy_package/package.json"
          if (Test-Path $pkgPath) {
            $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
            if (-not $pkg.scripts) { $pkg | Add-Member -NotePropertyName scripts -NotePropertyValue (@{}) }
            $pkg.scripts | Add-Member -NotePropertyName start -NotePropertyValue "node server.js" -Force
            $pkg | ConvertTo-Json -Depth 10 | Set-Content -Path $pkgPath -Encoding utf8
          }

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_package

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy_package

      - name: Parse publish profile
        env:
          PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9EE1E27F284E4B34B38D64CDC383452C }}
        run: |
          python3 <<'PY'
          import os, re
          xml = os.environ["PUBLISH_PROFILE"]
          profiles = re.findall(r"<publishProfile\b[^>]*>", xml)
          chosen = next((p for p in profiles if 'publishMethod="MSDeploy"' in p), profiles[0] if profiles else "")
          user = re.search(r'userName="([^"]+)"', chosen)
          pwd = re.search(r'userPWD="([^"]+)"', chosen)
          if not user or not pwd:
              raise SystemExit("Could not parse publish profile credentials")
          open("/tmp/kudu_user.txt", "w", encoding="utf-8").write(user.group(1))
          open("/tmp/kudu_pass.txt", "w", encoding="utf-8").write(pwd.group(1))
          print("Publish profile credentials loaded")
          PY

      - name: Free App Service disk before deploy
        run: |
          set -euo pipefail
          KUDU_USER=$(cat /tmp/kudu_user.txt)
          KUDU_PASS=$(cat /tmp/kudu_pass.txt)
          SCM_URL="https://turnover-dashboard.scm.azurewebsites.net"

          echo "Disk free space BEFORE cleanup:"
          curl -sS -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/json" \
            -X POST "$SCM_URL/api/command" \
            -d '{"command":"powershell -NoProfile -Command \"Get-PSDrive C | Select-Object Used,Free | Format-List\"","dir":"C:\\home"}' || true
          echo

          python3 <<'PY' > /tmp/kudu-clean.json
          import json
          cmd = (
              "powershell -NoProfile -Command "
              "\"Get-Process node,iisnode -ErrorAction SilentlyContinue | Stop-Process -Force; "
              "Remove-Item -LiteralPath 'C:\\home\\site\\wwwroot\\*' -Recurse -Force -ErrorAction SilentlyContinue; "
              "Remove-Item -LiteralPath 'C:\\home\\data\\SitePackages\\*' -Recurse -Force -ErrorAction SilentlyContinue; "
              "Remove-Item -LiteralPath 'C:\\local\\Temp\\zipdeploy\\*' -Recurse -Force -ErrorAction SilentlyContinue; "
              "Remove-Item -LiteralPath 'C:\\home\\site\\deployments\\temp\\*' -Recurse -Force -ErrorAction SilentlyContinue; "
              "if (Test-Path 'C:\\local\\LocalAppData\\npm-cache') { Remove-Item 'C:\\local\\LocalAppData\\npm-cache\\*' -Recurse -Force -ErrorAction SilentlyContinue }\""
          )
          print(json.dumps({"command": cmd, "dir": r"C:\home"}))
          PY

          echo "Cleaning App Service disk via Kudu..."
          curl -sS -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/json" \
            -X POST "$SCM_URL/api/command" \
            --data-binary @/tmp/kudu-clean.json
          echo

          echo "Disable build-during-deploy..."
          curl -sS -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/json" \
            -X POST "$SCM_URL/api/settings" \
            -d '{"SCM_DO_BUILD_DURING_DEPLOYMENT":"false"}' || true
          echo

          echo "Disk free space AFTER cleanup:"
          curl -sS -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/json" \
            -X POST "$SCM_URL/api/command" \
            -d '{"command":"powershell -NoProfile -Command \"Get-PSDrive C | Select-Object Used,Free | Format-List\"","dir":"C:\\home"}' || true
          echo

      - name: Create deployment zip
        run: |
          cd deploy_package
          zip -r ../site.zip . -q
          ls -lh ../site.zip

      - name: Deploy via Kudu ZipDeploy (classic, not OneDeploy)
        run: |
          set -euo pipefail
          KUDU_USER=$(cat /tmp/kudu_user.txt)
          KUDU_PASS=$(cat /tmp/kudu_pass.txt)
          SCM_URL="https://turnover-dashboard.scm.azurewebsites.net"

          echo "Uploading site.zip via /api/zipdeploy (classic)..."
          HTTP_CODE=$(curl -sS -o /tmp/zipdeploy_out.txt -w "%{http_code}" \
            -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/zip" \
            -X POST "$SCM_URL/api/zipdeploy?isAsync=false" \
            --data-binary @site.zip || true)

          echo "ZipDeploy HTTP status: $HTTP_CODE"
          cat /tmp/zipdeploy_out.txt || true
          echo

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Classic zipdeploy failed with $HTTP_CODE"
            exit 1
          fi

          echo "Requesting app restart..."
          curl -sS -u "$KUDU_USER:$KUDU_PASS" -X POST "$SCM_URL/api/app/restart" || true
          echo "Deploy finished."
