# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - turnover-dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: npm

      - name: npm install and build
        run: |
          npm ci
          npm run build

      - name: Prepare standalone deployment package
        shell: pwsh
        run: |
          if (-not (Test-Path .next/standalone)) {
            throw "Missing .next/standalone. Ensure next.config has output: 'standalone'."
          }

          New-Item -ItemType Directory -Force -Path deploy_package | Out-Null
          Copy-Item -Path .next/standalone/* -Destination deploy_package -Recurse -Force

          New-Item -ItemType Directory -Force -Path deploy_package/.next | Out-Null
          Copy-Item -Path .next/static -Destination deploy_package/.next/static -Recurse -Force

          if (Test-Path public) {
            Copy-Item -Path public -Destination deploy_package/public -Recurse -Force
          }

          if (Test-Path web.config) {
            Copy-Item -Path web.config -Destination deploy_package/web.config -Force
          }

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_package

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'turnover-dashboard'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9EE1E27F284E4B34B38D64CDC383452C }}
